<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="600" viewBox="0 0 1800 600">
  <defs>
    <pattern id="grid" width="36" height="36" patternUnits="userSpaceOnUse"><path d="M36 0H0V36" fill="none" stroke="#eeeeee" stroke-width="1"/></pattern>
    <clipPath id="clip-shaper"><circle cx="0" cy="0" r="1"/></clipPath>
    <style>
      .mono{font-family:JetBrains Mono,SFMono-Regular,Menlo,Consolas,monospace}
      .label{font-size:12px;letter-spacing:4px;text-transform:uppercase;fill:#8a8a8a}
      .tiny{font-size:10px;letter-spacing:2.4px;text-transform:uppercase;fill:#8a8a8a}
      .name{font-size:18px;font-weight:800;letter-spacing:5px;fill:#000}
      .edge{fill:none;stroke:#000;stroke-width:5;stroke-linecap:round}
      .edge-soft{fill:none;stroke:#aaa;stroke-width:2;stroke-dasharray:10 12;stroke-linecap:round}
      .edge-red{fill:none;stroke:#c43838;stroke-width:3;stroke-dasharray:12 10;stroke-linecap:round}
      .dot{fill:#000;stroke:#fff;stroke-width:3}
      .dot-red{fill:#c43838;stroke:#fff;stroke-width:3}
      @keyframes pulse{0%,100%{opacity:.3;transform:scale(.9)}50%{opacity:1;transform:scale(1.15)}}
      @keyframes dash{from{stroke-dashoffset:0}to{stroke-dashoffset:-44}}
      .moving{animation:dash 2.4s linear infinite}
      .pulse{transform-box:fill-box;transform-origin:center;animation:pulse 1.8s ease-in-out infinite}
    </style>
  </defs>
