    <g transform="translate(34 348)" class="mono">
      <rect width="622" height="36" fill="#111"/>
      <text x="22" y="24" font-size="16" fill="#fff" letter-spacing="3">MURMUR · GIT · NETLIFY · HUMAN OBSERVER</text>
