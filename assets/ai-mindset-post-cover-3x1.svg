        <text x="286" y="55" fill="#fff">v1</text>
        <circle cx="286" cy="150" r="34" fill="#111"/>
        <text x="286" y="157" fill="#fff">v2</text>
        <circle cx="286" cy="252" r="34" fill="#111"/>
