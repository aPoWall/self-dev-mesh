        <g transform="translate(354 36)">
          <rect width="42" height="42" fill="#fff" stroke="#111" stroke-width="2"/>
          <text x="21" y="27">c1</text>
        </g>
        <g transform="translate(410 36)">
          <rect width="42" height="42" fill="#111" stroke="#111" stroke-width="2"/>
          <text x="21" y="27" fill="#fff">c4</text>
        </g>
        <g transform="translate(354 138)">
          <rect width="42" height="42" fill="#fff" stroke="#111" stroke-width="2"/>
          <text x="21" y="27">c5</text>
        </g>
        <g transform="translate(410 138)">
          <rect width="42" height="42" fill="#111" stroke="#111" stroke-width="2"/>
          <text x="21" y="27" fill="#fff">c2</text>
        </g>
        <g transform="translate(354 240)">
          <rect width="42" height="42" fill="#fff" stroke="#111" stroke-width="2"/>
          <text x="21" y="27">c3</text>
